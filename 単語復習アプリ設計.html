  measurementId: "G-1FY7HZ1JLE"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();
const db = firebase.firestore();
console.log("✅ Firebase 準備完了 (カウントダウンDB同期版)");

let isGuest = false;
let testDate = null;
let countdownTimer = null;

// 🔐 ログイン（Live Server用ポップアップ）
async function loginWithGoogle() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
    window.location.reload();
  } catch (error) {
    console.error("❌ ログインエラー:", error);
    alert("ログインに失敗しました。詳細: " + error.message);
  }
}

async function logout() {
  await auth.signOut();
  window.location.reload();
}

function loginAsGuest() {
  isGuest = true;
  document.getElementById('user-info').textContent = "👤 ゲストユーザー";
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-container').style.display = 'block';
  
  // ゲスト用のローカル保存テスト日を読み込み
  const savedDate = localStorage.getItem('tanGO_testdate');
  if (savedDate) {
    testDate = new Date(savedDate);
    startCountdown();
  }
  showScreen('screen-home');
  updateStats();
}

// 👑 ランキングへの保存
async function saveScoreToLeaderboard(stats) {
  if (!auth.currentUser || isGuest) return;
  try {
    await db.collection('leaderboard').doc(auth.currentUser.uid).set({
      uid: auth.currentUser.uid,
      displayName: auth.currentUser.displayName || '名無し',
      email: auth.currentUser.email,
      learned: stats.learned || 0,
      totalAnswers: stats.totalAnswers || 0,
      accuracy: stats.accuracy || 0,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  } catch (e) { console.error("保存エラー:", e); }
}

// 👑 ランキングの取得
async function getGlobalLeaderboardFromCloud(limitCount = 3) {
  try {
    const snapshot = await db.collection('leaderboard').orderBy('learned', 'desc').limit(limitCount).get();
    return snapshot.docs.map(doc => doc.data());
  } catch (e) { return []; }
}
</script>

const ALL_WORDS = RAW.trim().split('\n').map(line => {
  const p = line.split('\t');
  return { id: parseInt(p[0], 10), en: p[1].trim(), jp: p[2].trim() };
});

const state = {
  queue: [], current: 0, results: [],
  learnedCount: parseInt(localStorage.getItem('tanGO_learned')||'0'),
  sessions: parseInt(localStorage.getItem('tanGO_sessions')||'0')
};

// 🚀 画面ロード時の処理（認証状態を監視しつつテスト日をロード）
// 🚀 画面ロード時の処理（成績とテスト日をクラウドから完全同期）
window.onload = () => {
  console.log("🚀 アプリ初期化開始...");
  
  auth.onAuthStateChanged(async (user) => {
    if (user) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-container').style.display = 'block';
      const userInfo = document.getElementById('user-info');
      if (userInfo) userInfo.textContent = `👤 ${user.displayName || user.email}`;
      
      // ☁️ Firestoreからユーザーの【テスト日】と【成績】を読み込む
      try {
        const userDoc = await db.collection('users').doc(user.uid).get();
        if (userDoc.exists) {
          const data = userDoc.data();
          
          // テスト日の同期
          if (data.testDate) {
            testDate = new Date(data.testDate);
          } else {
            const savedLocal = localStorage.getItem('tanGO_testdate');
            if (savedLocal) testDate = new Date(savedLocal);
          }

          // 成績の同期（クラウドのデータが多ければローカルを上書きする）
          if (data.learnedCount !== undefined) {
            state.learnedCount = Math.max(state.learnedCount, data.learnedCount);
            localStorage.setItem('tanGO_learned', state.learnedCount);
          }
          if (data.sessions !== undefined) {
            state.sessions = Math.max(state.sessions, data.sessions);
            localStorage.setItem('tanGO_sessions', state.sessions);
          }
        }
      } catch(e) { console.error("ユーザーデータ取得エラー:", e); }

      startCountdown();
      updateStats();
    } else if (!isGuest) {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app-container').style.display = 'none';
    }
  });
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('visible'));
  document.getElementById(id).classList.add('visible');
}

function setTestRange(type) {
  if (type === 'midterm') { document.getElementById('range-from').value = 0; document.getElementById('range-to').value = 140; }
  if (type === 'final') { document.getElementById('range-from').value = 141; document.getElementById('range-to').value = 282; }
  updateRangeSliders();
}

function updateRangeSliders() {
  const fi=parseInt(document.getElementById('range-from').value), ti=parseInt(document.getElementById('range-to').value);
  const lo=Math.min(fi,ti), hi=Math.max(fi,ti);
  document.getElementById('range-from-lbl').textContent = ALL_WORDS[lo].id;
  document.getElementById('range-to-lbl').textContent = ALL_WORDS[hi].id;
}

function startStudy() {
  const fi=parseInt(document.getElementById('range-from').value), ti=parseInt(document.getElementById('range-to').value);
  const lo=Math.min(fi,ti), hi=Math.max(fi,ti);
  state.queue = ALL_WORDS.slice(lo, hi+1).map(w => ({word: w, dir: 'jp-en'})).sort(() => Math.random() - 0.5);
  state.current = 0; state.results = [];
  showScreen('screen-quiz'); renderQuestion();
}

function startRandomN() {
  const n = parseInt(document.getElementById('random-n-slider').value);
  state.queue = ALL_WORDS.map(w => ({word: w, dir: 'jp-en'})).sort(() => Math.random() - 0.5).slice(0, n);
  state.current = 0; state.results = [];
  document.getElementById('random-modal').classList.remove('open');
  showScreen('screen-quiz'); renderQuestion();
}

function renderQuestion() {
  const w = state.queue[state.current].word;
  document.getElementById('quiz-counter').textContent = `${state.current+1} / ${state.queue.length}`;
  document.getElementById('quiz-progress').style.width = ((state.current / state.queue.length) * 100) + '%';
  document.getElementById('quiz-word').textContent = w.jp;
  document.getElementById('quiz-hint').textContent = '英語で答えてください';
  document.getElementById('quiz-answer').value = '';
  document.getElementById('quiz-answer').disabled = false;
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('btn-submit').style.display = 'block';
  document.getElementById('btn-next').style.display = 'none';
  setTimeout(()=>document.getElementById('quiz-answer').focus(), 50);
}

function submitAnswer() {
  const ans = document.getElementById('quiz-answer').value.trim().toLowerCase();
  const correct = state.queue[state.current].word.en;
  
  let grade = 'wrong';
  if (ans === correct) grade = 'correct';
  else if (ans !== '' && (correct.includes(ans) || ans.includes(correct)) && ans.length > 2) grade = 'partial';

  state.results.push({ grade });
  
  const cls = grade==='correct'?'result-correct':grade==='partial'?'result-partial':'result-wrong';
  const lbl = grade==='correct'?'✓ 正解！':grade==='partial'?'△ 部分正解':'✗ 不正解';
  
  const resEl = document.getElementById('quiz-result');
  resEl.innerHTML = `<div class="result-box ${cls}"><strong>${lbl}</strong><br>模範解答: <strong>${correct}</strong></div>`;
  resEl.style.display = 'block';
  
  document.getElementById('quiz-answer').disabled = true;
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('btn-next').style.display = 'block';
}

function nextQuestion() {
  state.current++;
  if (state.current >= state.queue.length) finishQuiz(false);
  else renderQuestion();
}

function finishQuiz(isExit) {
  document.getElementById('exit-modal').classList.remove('open');
  if (state.results.length === 0) { showScreen('screen-home'); return; }
  
  state.sessions++;
  const correctCount = state.results.filter(r => r.grade === 'correct').length;
  const total = state.results.length;
  state.learnedCount += correctCount;
  
  // ローカルに保存
  localStorage.setItem('tanGO_learned', state.learnedCount);
  localStorage.setItem('tanGO_sessions', state.sessions);

  // ☁️ クラウドに完全保存（ゲスト以外）
  if (!isGuest && auth.currentUser) {
    // 1. 個人の成績データベースに保存（追加！）
    db.collection('users').doc(auth.currentUser.uid).set({
      learnedCount: state.learnedCount,
      sessions: state.sessions,
      lastLogin: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true }).catch(e => console.error("個人成績の保存エラー:", e));

    // 2. ランキングデータベースに保存
    saveScoreToLeaderboard({
      learned: state.learnedCount,
      totalAnswers: state.learnedCount + 10,
      accuracy: Math.round((correctCount / total) * 100)
    });
  }

  if (isExit) { showScreen('screen-home'); updateStats(); return; }

  document.getElementById('result-sub').textContent = `${total}問中 ${correctCount}問正解！`;
  showScreen('screen-result');
}

// 👑 ホーム画面にランキングを表示
function updateStats() {
  document.getElementById('stat-total').textContent = state.learnedCount;
  document.getElementById('stat-sessions').textContent = state.sessions;
  
  const homeLeaderboard = document.getElementById('home-leaderboard');
  if (isGuest) {
    homeLeaderboard.innerHTML = "<span style='color:#888;'>ランキングを見るにはログインが必要です</span>";
  } else {
    homeLeaderboard.innerHTML = "<span style='color:#888;'>☁️ クラウドから取得中...</span>";
    getGlobalLeaderboardFromCloud(3).then(board => {
      if (!board || board.length === 0) {
        homeLeaderboard.innerHTML = "まだデータがありません。一番乗りを目指しましょう！";
      } else {
        homeLeaderboard.innerHTML = board.map((e, i) => {
          const m = e.email ? e.email.split('@')[0].slice(0,3)+'***' : '名無し';
          return `<div style="padding:6px; background:${i===0?'#fff9c4':'#f5f5f5'}; border-radius:6px; margin-bottom:4px;">
            ${i===0?'👑':i===1?'🥈':'🥉'} ${i+1}. ${e.displayName||m} — <strong style="color:#1976d2;">${e.learned}語</strong>
          </div>`;
        }).join('');
      }
    });
  }
}

function openTestDateModal() {
  document.getElementById('testdate-modal').classList.add('open');
  if (testDate) {
    const y = testDate.getFullYear();
    const m = String(testDate.getMonth() + 1).padStart(2, '0');
    const d = String(testDate.getDate()).padStart(2, '0');
    const h = String(testDate.getHours()).padStart(2, '0');
    const min = String(testDate.getMinutes()).padStart(2, '0');
    document.getElementById('testdate-date').value = `${y}-${m}-${d}`;
    document.getElementById('testdate-time').value = `${h}:${min}`;
  }
}

function setQuickTestDate(dateStr, timeStr) {
  document.getElementById('testdate-date').value = dateStr;
  document.getElementById('testdate-time').value = timeStr;
}

async function saveTestDate() {
  const dateVal = document.getElementById('testdate-date').value;
  const timeVal = document.getElementById('testdate-time').value || '12:00';
  if (!dateVal) { alert("日付を選択してください"); return; }
  
  testDate = new Date(`${dateVal}T${timeVal}:00`);
  
  // クラウドに保存（ゲスト以外）
  if (!isGuest && auth.currentUser) {
    try {
      await db.collection('users').doc(auth.currentUser.uid).set({
        testDate: testDate.toISOString()
      }, { merge: true });
      console.log("✅ テスト日をクラウドに保存しました");
    } catch(e) { console.error("テスト日保存エラー:", e); }
  } else {
    // ゲスト用フォールバック
    localStorage.setItem('tanGO_testdate', testDate.toISOString());
  }

  document.getElementById('testdate-modal').classList.remove('open');
  startCountdown();
}

function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  tickCountdown(); // すぐに1回更新
  countdownTimer = setInterval(tickCountdown, 1000);
}

function tickCountdown() {
  const labelEl = document.getElementById('countdown-label');
  const daysEl = document.getElementById('countdown-days');
  const hmsEl = document.getElementById('countdown-hms');
  const normaEl = document.getElementById('norma-area');
  
  if (!testDate) {
    labelEl.textContent = 'テスト日を設定してください';
    daysEl.textContent = '--';
    hmsEl.textContent = '--:--:--';
    normaEl.innerHTML = '';
    return;
  }

  const now = new Date();
  const diff = testDate - now;

  if (diff <= 0) {
    labelEl.textContent = 'テスト当日！';
    daysEl.textContent = '0';
    hmsEl.textContent = '00:00:00';
    normaEl.innerHTML = '<div class="norma-badge">🎯 頑張れ！</div>';
    return;
  }

  const totalSec = Math.floor(diff / 1000);
  const days = Math.floor(totalSec / 86400);
  const hours = Math.floor((totalSec % 86400) / 3600);
  const mins = Math.floor((totalSec % 3600) / 60);
  const secs = totalSec % 60;
  
  const pad = n => String(n).padStart(2,'0');
  const y = testDate.getFullYear();
  const mo = testDate.getMonth() + 1;
  const d = testDate.getDate();
  const h = testDate.getHours();
  const mi = testDate.getMinutes();
  
  labelEl.textContent = `テストまで（${y}/${pad(mo)}/${pad(d)} ${pad(h)}:${pad(mi)}）`;
  daysEl.textContent = days;
  hmsEl.textContent = `${pad(hours)}:${pad(mins)}:${pad(secs)}`;

  // ノルマ計算（未学習の単語数 ÷ 残り日数）
  const TOTAL = ALL_WORDS.length;
  const learned = state.learnedCount;
  const remaining = Math.max(0, TOTAL - learned);
  const norma = Math.ceil(remaining / (days + 1));
  normaEl.innerHTML = `<div class="norma-badge">📚 今日のノルマ: ${norma}語</div>`;
}
</script>
</body>
